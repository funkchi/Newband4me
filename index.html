<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="One band a day. Leave the rest to luck." />
    <meta name="theme-color" content="#ffffff" />
    <meta property="og:title" content="Newband4me" />
    <meta property="og:description" content="One band a day. Leave the rest to luck." />
    <meta property="og:url" content="https://newband4me.com/" />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://newband4me.com/" />
    <title>Newband4me</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <header>
      <a class="wordmark" href="/" aria-label="Newband4me home">Newband4me</a>
    </header>

    <main>
      <div class="lucky-machine">
        <svg
          class="hero-mark"
          viewBox="0 0 128 128"
          role="img"
          aria-label="A vinyl record and stylus"
        >
          <circle cx="55" cy="68" r="34" />
          <circle cx="55" cy="68" r="9" />
          <path d="M84 36h20l8 8" />
          <path d="M100 44 84 60" />
          <path d="M84 60v20" />
          <path d="M80 80h8" />
        </svg>

        <button id="lucky-button" type="button">
          <span>I'm feeling lucky</span>
          <span aria-hidden="true">↗</span>
        </button>
        <p id="status" aria-live="polite">One band. Every day.</p>
      </div>
    </main>

    <footer>
      <a
        href="https://github.com/funkchi/repo"
        target="_blank"
        rel="noreferrer"
        aria-label="View Newband4me on GitHub"
      >GitHub</a>
    </footer>
  </body>
</html>
